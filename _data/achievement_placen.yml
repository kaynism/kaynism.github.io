- layout: left
  name: 나우웨이팅 리엔지니어링
  description: |
    * **2026.06 ~** (진행중)
    * 10년 이상 운영된 단일 레거시 시스템(Ruby on Rails)의 전면 재설계 — CTO 주도 아키텍처 하에 **코어 도메인 모델링 리딩** 담당
    * 포탈(점주 전용 플랫폼)·허브(사내 운영팀 전용 플랫폼)라는 신규 개념을 도입하고, 두 플랫폼에 코어 기능을 직접 제공하는 코어 도메인 서버(spot/waiting)를 분리한 멀티모듈 아키텍처 (Kotlin/Spring Boot 4)
    * 코어 도메인 서버의 모델 설계와 포탈·허브에 제공되는 코어 기능 구현을 직접 담당
    * B2C 인증 단일책임 서버(auth) 분리 — 도메인 서버 앞단 인증 + Istio 서비스메시 신원 전파, 도메인 서버는 자체 인증 없이 헤더 신뢰
    * 10년간 누적된 레거시 운영 부채(CS 유발 도메인 정책, 영업일자·시간대 처리, 감사 이력 부재 등)를 재설계 과정에서 하나씩 해소
  achievements: |
    * **모듈러 모놀리스 채택 논거 주도**: <b>MSA 전환 권고에 대해 "도메인 간 트래픽 동반 증가로 정밀 확장 이득 없음 + 즉시 일관성 요구" 기술 반박 문서를 작성, 아키텍처 방향 결정에 기여</b>
    * **모듈 간 통신 단순화**: <b>Feign/interface 모듈 없이 Istio 기반 직접 HTTP 통신, 인프라 모듈은 redis/kafka로 분할하여 필요한 서버만 선택 의존</b>
    * **이벤트 소싱 기반 상태 히스토리**: <b>운영모드 전환 등 상태 변경을 이벤트 SSOT로 기록, 조회 서버는 Command 0개의 순수 조회 유지로 단일 Writer 보장</b>
    * **범용 감사 로그 설계**: <b>domain/entity_id/changes 구조의 공용 audit_log + Hibernate 리스너 자동 캡처로 도메인 코드 오염 없이 변경 추적</b>
    * **통합테스트 검증 표준 수립**: <b>스토리마다 Docker 기반 컨텍스트 로드/영속 검증을 필수화 — 단위테스트로 잡히지 않는 빈(Bean) 구성 누락을 머지 전 차단</b>
    * **Spring Boot 4 얼리어답팅**: <b>Jackson 3(tools.jackson) 전환, Resilience4j 미지원 구간은 RestClient 기반 폴백으로 우회</b>
    * **레거시 CS 유발 정책 재설계**: <b>외부 파트너 QA에서 반복 지적된 영업상태 자동 전환 정책·일시중지(PAUSE) 남용 등 레거시 도메인 정책을 리엔지니어링 범위에서 재설계</b>
    * **히스토리 도메인 일원화**: <b>웨이팅 이력·운영모드 전환 이력을 동형 이벤트 모델로 통일, 감사(audit)와 사용자용 히스토리를 분리해 목적별 저장소 설계</b>
  troubleshooting: |
    * **클러스터·비즈니스별로 파편화된 인증 체계 통합**
      - 문제: K8s 클러스터별로 분리된 서버들과 사용자군별(B2C 고객 / 점주 포탈 / 운영팀 허브) 인증 요구가 서로 달라, 레거시처럼 각 서버가 자체 인증을 중복 구현하면 정책 변경마다 전 서버 수정이 필요한 구조
      - 해결: B2C 인증 단일책임 서버(auth)를 도메인 서버 앞단에 배치하고 Istio 서비스메시로 신원을 전파, 코어 도메인 서버(spot/waiting)는 인증 로직 없이 검증된 헤더만 신뢰하도록 책임 분리
    * **순서 미루기 × 사전 알림의 도메인 상호작용**
      - 문제: 신규 기능인 "순서 미루기"와 "입장 N팀 전 사전 알림"이 결합되면, 미루기 시점에 이미 발송된 알림이 무효화되거나 재정렬된 대기열 기준으로 알림이 중복/누락되는 케이스가 발생
      - 해결: 대기열 순서를 이벤트 기반으로 재계산하고 알림 발송 조건을 순번 스냅샷이 아닌 현재 대기열 상태 기준으로 판정하도록 설계
  version: |
    * Kotlin Version : <b>2.3.x</b>
    * Spring Boot Version : <b>4.0.6</b>
    * Java Version : <b>25</b>
    * ETC. : <b>Spring Data JPA, QueryDSL, PostgreSQL, Redis, Kafka, Istio, AWS(EKS, S3, IRSA), ArgoCD, Kustomize, External Secrets Operator, Docker, TestContainers</b>

- layout: left
  name: 네이버 스마트플레이스 줄서기 연동
  description: |
    * **2026.05 ~ 2026.06**
    * 나우웨이팅 웨이팅 서비스와 네이버 스마트플레이스 '줄서기'의 연동 설계 및 개발 (push 동기화 + pull 대사 기반)
    * 네이버 PBP(Place Business Platform) API 기반 매장 운영정보 송신 + 네이버 유입 웨이팅 수신 파이프라인 구축
    * 사업주 네이버 아이디 로그인(네아로) 기반 매장 매핑 CRUD 어드민 신규 구축
  achievements: |
    * **외부 파트너 연동 스펙 설계 리드**: <b>나우웨이팅 4개 운영모드 × 네이버 PBP 상태 필드 매핑표를 직접 설계·확정, 스펙 공백 2건(미설정 구간, 상태-사유 불일치)을 선제 발굴하여 정책 결정 주도</b>
    * **준실시간 운영정보 Push 파이프라인**: <b>변경 매장만 골라 5초 주기 묶음 전송(Dirty Set 폴링) + AWS EventBridge 1분 제약을 sub-loop 12회로 우회한 5초 스케줄링</b>
    * **크로스-조직 장애 디버깅**: <b>파트너 배치의 파라미터 직렬화 방식과 Rack 파싱 규칙 충돌로 연동 데이터가 배치 주기마다 초기화되던 장애를 초 단위 로그 교차대조로 격리, 파트너 측 무변경으로 3가지 직렬화 형식 모두 수용하도록 수정하여 오픈 일정 사수</b>
    * **QA 대응 리드타임 최소화**: <b>파트너 QA 지적 결함 대부분을 당일~2일 내 수정·배포·검증 완료, 오픈 전날 데이터 이격 건은 하루 2회 배포 + 실시간 협의로 당일 해소</b>
    * **유입 채널(source) 무결성 설계**: <b>서버가 내려주는 URL을 SSOT로 채널 식별 파라미터를 통제, 네이버 유입 시 네아로 단일 로그인 노출</b>
    * **예상대기시간 실측 전송**: <b>팀당 10분 고정 방식을 매장 어드민 실측값 위임으로 전환, 대기 0팀 시 필드 미전송 등 노출 정책 협의 반영</b>
    * **이종 플랫폼 계정 통합**: <b>카카오↔네이버 가입 고객을 전화번호 기준으로 머지, 채널 간 웨이팅 이력 단일화</b>
  troubleshooting: |
    * **연동 매장 데이터 주기적 초기화 장애**
      - 문제: 파트너 대사(pull) 배치 호출 시 N건 조회 요청이 1건만 처리되어, "응답 누락 매장은 삭제" 정책과 결합해 연동 데이터가 배치 주기마다 초기화
      - 해결: 초 단위 전송 로그 교차대조로 "repeated query param을 Rack이 마지막 값으로 덮어쓰는" 근본원인을 재현·격리, 파트너 공통 배치 무변경 원칙으로 자사 서버가 repeated/배열/콤마 3형식을 모두 수용하도록 방어적 파싱 적용
    * **운영모드 전환 시 전송 누락 (트리거 설계 결함)**
      - 문제: 모드 전환 자체에 전송 트리거가 없어 간접 트리거에 의존, 모바일 상태가 유지되는 전환은 이전 값이 고착되어 전송
      - 해결: 로그 타임라인 대조로 규명 후 모드 전환·매핑 생성 직후·시간 기반 전이(영업 시작/종료)까지 전송 트리거로 직접 등록, 트리거 전수 점검으로 잠재 누락 2건 추가 선발견
    * **배치 직접 INSERT 데이터의 콜백 누락**
      - 문제: 배치 서버가 DB에 직접 INSERT한 영업상태 변경이 Rails 모델 콜백을 타지 않아 전송 누락
      - 해결: 운영상태 스냅샷(operational_state)을 확장하여 폴링 시점 비교 기반 변경 감지로 전환, 콜백 의존 제거
    * **어드민/웹 표시와 외부 전송 데이터의 채널 간 이격**
      - 문제: 영업상태 "미설정" 구간에서 어드민/웹 표시 규칙과 외부 전송 매핑이 서로 다르게 동작하여 파트너 QA에서 데이터 불일치 반복 지적
      - 해결: 채널별 동작 차이를 케이스 매트릭스로 정리해 파트너와 매핑 정책 재협의, 오픈 전날 2회 배포로 "내부 상태 = 외부 전송" 단일 기준 확립
  version: |
    * ETC. : <b>Ruby on Rails(API), Sidekiq, Redis, PostgreSQL, AWS(EventBridge, Elastic Beanstalk), Naver PBP API, 네이버 아이디로 로그인(OAuth 2.0)</b>

- layout: left
  name: 통합 메시지 플랫폼(UMS) 서비스 개발
  link: /projects/placen-ums-architecture.html
  description: |
    * **2026.03** (TF, 1개월)
    * 사내 서비스(도도포인트, 나우웨이팅, CRM) 통합 멀티채널 메시징 플랫폼 TF — 설계·구현·테스트 완료
    * 6개 마이크로서비스 모듈 기반 이벤트 드리븐 아키텍처 (Kafka + Outbox 패턴)
    * 지원 채널: SMS, LMS, MMS, Email, Push, BizTalk (벤더: UPlus MsgHub, AWS SES, Firebase FCM)
    * 이후 타 프로젝트(네이버 줄서기 연동, 나우웨이팅 리엔지니어링) 우선순위로 운영 전환은 보류
  achievements: |
    * **멀티모듈 이벤트 드리븐 아키텍처**: <b>6개 서버 모듈 + Kafka 기반 비동기 파이프라인, Outbox 패턴으로 메시지 유실 방지 (통합테스트 검증)</b>
    * **Redis Lua Guard 패턴**: <b>취소 확인 + 멱등성 + Rate Limit을 단일 RTT로 원자적 실행, 중복 발송 원천 차단 (동시성 테스트 검증)</b>
    * **Circuit Breaker + Fallback 라우팅**: <b>벤더별 장애 자동 차단(5회 실패 → OPEN) 및 대체 채널 Fallback, 향후 통신사 간 자동 전환(UPlus→KT 등) 확장 설계</b>
    * **상태 머신 기반 메시지 추적**: <b>QUEUED→PENDING→SENT→SUCCESS/FAILED 전이 검증, 8개 테이블 + Flyway 스키마 관리</b>
    * **멀티채널 통합 발송**: <b>7개 채널 × 3개 벤더 라우팅, 대량 발송 + 예약 발송 구현</b>
    * **모니터링 체계 구축**: <b>Micrometer 커스텀 메트릭 4종(처리 건수/벤더 레이턴시/서킷브레이커 트립/예약 처리) + Prometheus 연동</b>
  troubleshooting: |
    * **Transactional Outbox 패턴으로 메시지 유실 방지**
      - 문제: 비즈니스 데이터 저장 후 Kafka 발행 실패 시 이벤트 유실 및 정합성 깨짐
      - 해결: 단일 트랜잭션으로 비즈니스 데이터 + OutboxEvent 동시 저장, Batch 1분 폴링 릴레이 + DLQ 3회 재시도 후 격리로 At-Least-Once 보장
    * **멀티채널 메시지 순서 보장**
      - 문제: 동일 수신자에게 발송되는 메시지 간 순서가 보장되지 않아 상태 업데이트 역전 발생
      - 해결: Kafka Partition Key를 수신자 기준(phoneNumber/email/deviceId)으로 설정하여 동일 수신자 메시지를 동일 파티션에 할당, 파티션 내 순서 보장
    * **벤더 장애 시 대량 발송 실패 전파**
      - 문제: 특정 벤더(UPlus) 장애 시 SMS/LMS/MMS 전체 발송 실패 누적
      - 해결: 벤더별 Custom Circuit Breaker(CLOSED→OPEN→HALF_OPEN) + ChannelConfig 기반 Fallback 채널 자동 전환
    * **동시 취소/발송 Race Condition**
      - 문제: 관리자 취소 요청과 발송 처리가 동시 진행 시 취소된 메시지 발송
      - 해결: Redis Lua 스크립트로 취소 플래그 확인 + 멱등성 + Rate Limit을 원자적 1 RTT로 처리
  version: |
    * Kotlin Version : <b>2.3.0</b>
    * Spring Boot Version : <b>4.0.1 RELEASE</b>
    * Java Version : <b>25</b>
    * ETC. : <b>Kotlin, Spring Data(JPA, Redis), Spring Kafka(AWS MSK, Confluent 7.9.0), PostgreSQL, Redis Lua Script, Flyway, Micrometer/Prometheus, AWS(SES v2, S3), Firebase Admin SDK, SpringDoc OpenAPI, Docker</b>

- layout: left
  name: 물류웨이팅
  description: |
    * 기존 나우웨이팅(F&B 매장 웨이팅) 서비스를 물류센터(쿠팡물류센터 등) 향으로 도메인 확장
    * 물류 도메인 모델링: Logistics(물류 예약), Dock(도크/하차점), Line(물류 라인) 엔티티 설계
    * 도크 배정/해제, 라인별 온도 구분(상온/냉동/냉장), 차량번호 기반 웨이팅 관리
  achievements: |
    * **물류 도메인 신규 설계**: <b>3개 핵심 엔티티(Logistics/Dock/Line) + 5개 Enum + 12개 Custom Exception 체계화</b>
    * **이벤트 기반 도메인 분리**: <b>Waiting↔Logistics 직접 의존 제거, 결합도 0으로 감소</b>
    * **조회 성능 최적화**: <b>QueryDSL JOIN FETCH 4개 조인으로 N+1 쿼리 수 평균 12회 → 1회로 감소 (92% 개선)</b>
    * **도크 배정 정합성**: <b>ValidatorFactory 5가지 검증 로직으로 잘못된 배정 오류율 0%</b>
    * **CQRS 적용**: <b>읽기 트랜잭션 readOnly 전환으로 Hibernate dirty checking 비활성화, 메모리 사용 약 30% 절감</b>
    * **테스트 커버리지**: <b>물류 도메인 JaCoCo Line 80%+ 달성</b>
  troubleshooting: |
    * **도크 배정 시 도메인 불변식 위반**
      - 문제: 도크 상태(CLOSED/PAUSED)나 라인 불일치 시에도 배정이 가능한 상황
      - 해결: DockValidator에 5가지 검증 로직 캡슐화 (상태, 중복, 라인 일치, 반납 가능 여부)
    * **Waiting↔Logistics 도메인 간 강결합**
      - 문제: Waiting 생성 시 Logistics 직접 참조로 순환 의존 발생
      - 해결: Spring ApplicationEventPublisher + TransactionalEventListener(BEFORE_COMMIT)로 이벤트 기반 통신 전환
    * **물류 목록 조회 성능**
      - 문제: Logistics 조회 시 Line, Dock, Waiting 연관관계에서 N+1 쿼리 다수 발생
      - 해결: QueryDSL innerJoin().fetchJoin() 4개 조인 + PageableExecutionUtils로 count 쿼리 분리
  version: |
    * Java Version : <b>17</b>
    * Spring Boot Version : <b>3.1.3 RELEASE</b>
    * ETC. : <b>Java, Spring Data JPA, QueryDSL 5.0, Redisson 3.34, MapStruct 1.5.5, Spring Kafka, PostgreSQL, TestContainers, Fixture Monkey, JaCoCo, SonarQube</b>

- layout: left
  name: 네이버 커넥트주문
  description: |
    * 네이버와 포스사를 연결하는 커넥트주문 화이트라벨 플랫폼 백엔드 개발
    * 6개 마이크로서비스 모듈 기반 멀티모듈 아키텍처 설계 및 구현 (Gateway, Integration, CEO Admin, Super Admin, POS Admin, POS Open API)
    * JWT 기반 멀티 사용자 인증/인가 시스템 구축 (B2C, CEO Admin, POS Admin, SuperAdmin)
    * QR 코드 기반 테이블 주문 시스템 (ShortenUrl → OrderDestination → OrderGroup → Order)
  achievements: |
    * **멀티모듈 마이크로서비스 아키텍처 설계**: <b>6개 서비스 모듈 + 공통 모듈, Spring Cloud Gateway 기반 단일 진입점</b>
    * **CQRS 패턴 적용**: <b>Command/Query 분리로 읽기/쓰기 최적화, Master/Slave DB 분리</b>
    * **전략 패턴 기반 다형 인증 시스템**: <b>AuthStrategy 인터페이스로 4가지 사용자 유형별 인증 로직 분리 (OCP 준수)</b>
    * **분산 락 구현**: <b>Redis(Redisson) AOP 기반 선언적 분산 락으로 동일 테이블 동시 주문 Race Condition 방지</b>
    * **Naver OAuth2 통합**: <b>CEO Admin 네이버 로그인 연동, Authorization Code 흐름 구현</b>
    * **Refresh Token Rotation**: <b>Redis 기반 Refresh Token 저장 + HttpOnly 쿠키 + Token Rotation으로 보안 강화</b>
    * **DB 스키마 자동화**: <b>Flyway 기반 45개 마이그레이션 버전 관리</b>
  troubleshooting: |
    * **동시 주문 Race Condition**
      - 문제: 동일 테이블에 동시 주문 시 OrderGroup 중복 생성
      - 해결: Redis 분산 락(Redisson) AOP 기반 @DistributedLock으로 동시성 제어
    * **멀티 사용자 유형 인증 복잡성**
      - 문제: B2C, CEO/POS Admin, SuperAdmin 각각 다른 인증 흐름
      - 해결: Strategy Pattern + AuthStrategy 인터페이스 4개 구체 전략으로 OCP 준수
